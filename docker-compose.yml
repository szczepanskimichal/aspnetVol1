version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong@Passw0rd"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P YourStrong@Passw0rd -C -Q 'SELECT 1'"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - aspnetwork

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5042:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__ShirtStoreManagement: "Server=sqlserver;Initial Catalog=ShirtStoreDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - aspnetwork

volumes:
  sqlserver_data:

networks:
  aspnetwork:
    driver: bridge

